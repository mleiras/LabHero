services:
  backend:
    build:
      context: ../backend
    container_name: labhero-backend
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: labhero-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

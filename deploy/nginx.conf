server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx's default mime.types (included at the http{} level by the upstream
    # nginx:alpine image) already maps .wasm to application/wasm, .html to
    # text/html, .js to application/javascript, etc. Declaring a `types {}`
    # block in this server scope would REPLACE that inherited map, breaking
    # HTML rendering — don't.

    # Static game bundle.
    location / {
        try_files $uri $uri/ =404;
        # Pygbag's service worker caches aggressively; tell browsers not to
        # cache index.html itself so deploys roll out promptly. The hashed
        # bundle assets can still be cached for longer if desired.
        add_header Cache-Control "no-cache" always;
    }

    # API proxy: /api/simulate -> backend:8000/simulate
    # The trailing slash on proxy_pass strips the /api/ prefix.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FBA + cobra responses arrive within ~1s for the e_coli_core model,
        # but bump the read timeout in case the backend is cold-starting.
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

name: macOS Build

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version label used in asset filenames (e.g. v0.1.0-macos). Used only for manual runs.'
        required: false
        default: 'dev'
  pull_request:
    branches:
      - main
    paths:
      - 'installer/**'
      - 'requirements.txt'
      - 'LabHero.py'
      - 'code/**'
      - '.github/workflows/macos-build.yml'
  push:
    tags:
      - 'v*-macos'

jobs:
  build:
    name: Build (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            asset_suffix: intel
          - runner: macos-14
            arch: arm64
            asset_suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install build dependencies
        run: pip install -r installer/requirements-build.txt

      - name: Generate LabHero.icns from PNG
        run: |
          mkdir -p LabHero.iconset
          sips -z 16 16     LabHero-icon.png --out LabHero.iconset/icon_16x16.png
          sips -z 32 32     LabHero-icon.png --out LabHero.iconset/icon_16x16@2x.png
          sips -z 32 32     LabHero-icon.png --out LabHero.iconset/icon_32x32.png
          sips -z 64 64     LabHero-icon.png --out LabHero.iconset/icon_32x32@2x.png
          sips -z 128 128   LabHero-icon.png --out LabHero.iconset/icon_128x128.png
          sips -z 256 256   LabHero-icon.png --out LabHero.iconset/icon_128x128@2x.png
          sips -z 256 256   LabHero-icon.png --out LabHero.iconset/icon_256x256.png
          sips -z 512 512   LabHero-icon.png --out LabHero.iconset/icon_256x256@2x.png
          sips -z 512 512   LabHero-icon.png --out LabHero.iconset/icon_512x512.png
          iconutil -c icns LabHero.iconset -o LabHero.icns
          rm -rf LabHero.iconset

      - name: Build LabHero.app with PyInstaller
        env:
          PYI_TARGET_ARCH: ${{ matrix.arch }}
        run: python -m PyInstaller --noconfirm --clean installer/labhero.spec

      - name: Determine version tag
        id: version
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "tag=${{ github.event.inputs.version_tag }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "tag=dev" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Zip LabHero.app with ditto
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent LabHero.app \
            "../LabHero-${{ steps.version.outputs.tag }}-macos-${{ matrix.asset_suffix }}.zip"

      - name: Report bundle size
        run: |
          ls -lh "LabHero-${{ steps.version.outputs.tag }}-macos-${{ matrix.asset_suffix }}.zip"
          du -sh dist/LabHero.app

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabHero-${{ steps.version.outputs.tag }}-macos-${{ matrix.asset_suffix }}
          path: LabHero-${{ steps.version.outputs.tag }}-macos-${{ matrix.asset_suffix }}.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "LabHero-${{ steps.version.outputs.tag }}-macos-${{ matrix.asset_suffix }}.zip" \
            --clobber
